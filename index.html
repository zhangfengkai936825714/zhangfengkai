<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>同学录</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --accent-gradient: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.16);
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            padding: 0;
            transition: all 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 35px 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header .logo {
            width: 60px;
            height: 60px;
            background: var(--accent-gradient);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .login-form .form-group {
            margin-bottom: 18px;
        }

        .login-form .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .login-form .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .login-form .form-group input:focus {
            outline: none;
            border-color: #e94560;
            background: white;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        .login-form .form-group input::placeholder {
            color: #94a3b8;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }

        .login-error {
            background: #fff1f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            display: none;
            text-align: center;
        }

        .main-page {
            display: none;
            min-height: 100vh;
        }

        .main-page.active {
            display: block;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 10px 15px;
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-brand .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
        }

        .navbar-brand h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: #f1f5f9;
            border-radius: 15px;
            font-weight: 500;
        }

        .user-info.admin {
            background: #fff7ed;
            color: #ea580c;
        }

        .user-info.admin::before {
            content: '👑';
            margin-right: 4px;
        }

        .logout-btn {
            padding: 6px 14px;
            background: #f1f5f9;
            border: none;
            border-radius: 15px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #e2e8f0;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.85;
            font-weight: 300;
        }

        .action-bar {
            text-align: center;
            margin-bottom: 25px;
        }

        .add-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .student-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .student-photo {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .student-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-photo .default-avatar {
            font-size: 3.5rem;
            color: #cbd5e0;
        }

        .student-info {
            padding: 16px;
        }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .student-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .student-constellation {
            padding: 3px 10px;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #2563eb;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .student-motto {
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #e94560;
            line-height: 1.5;
        }

        .student-details {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .detail-item .icon {
            font-size: 0.7rem;
        }

        .detail-item strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .student-message {
            padding: 12px;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-radius: 10px;
            font-size: 0.8rem;
            color: #15803d;
            line-height: 1.5;
            margin-bottom: 12px;
            position: relative;
        }

        .student-message::before {
            content: '💌';
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 1rem;
            opacity: 0.4;
        }

        .admin-message {
            padding: 10px;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border-radius: 8px;
            font-size: 0.75rem;
            color: #92400e;
            line-height: 1.4;
            margin-bottom: 12px;
            border-left: 3px solid #f59e0b;
        }

        .admin-message::before {
            content: '👑 ';
            font-weight: bold;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #f1f5f9;
        }

        .admin-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-delete {
            background: #fef2f2;
            color: #dc2626;
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        .btn-add-message {
            background: #dbeafe;
            color: #2563eb;
        }

        .btn-add-message:hover {
            background: #bfdbfe;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
            padding: 0;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.2);
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            background: var(--accent-gradient);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .modal-close {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1rem;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-content {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .form-group label span {
            color: #ef4444;
            margin-left: 4px;
            font-size: 0.75rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-family: inherit;
            background: #fafbfc;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
            background: white;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .photo-upload {
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .photo-upload:hover {
            border-color: #e94560;
            background: #fef2f2;
        }

        .photo-upload.has-photo {
            border-style: solid;
            padding: 10px;
        }

        .photo-upload.has-photo:hover {
            background: #fff5f5;
            border-color: #ef4444;
        }

        .photo-upload img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .photo-upload .upload-icon {
            font-size: 2.5rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .photo-upload .upload-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .photo-upload .remove-text {
            color: #ef4444;
            margin-top: 8px;
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            padding-bottom: 15px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }

        .btn-cancel {
            background: #f1f5f9;
            color: var(--text-secondary);
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 50px 20px;
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .empty-state p {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .empty-state .hint {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @media (min-width: 768px) {
            .login-container {
                padding: 45px 40px;
                max-width: 420px;
            }

            .login-header .logo {
                width: 75px;
                height: 75px;
                font-size: 2.3rem;
            }

            .login-header h1 {
                font-size: 1.7rem;
            }

            header h1 {
                font-size: 2.2rem;
            }

            header p {
                font-size: 1rem;
            }

            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 25px;
            }

            .student-photo {
                height: 200px;
            }

            .student-info {
                padding: 20px;
            }

            .student-name {
                font-size: 1.3rem;
            }

            .add-btn {
                padding: 14px 45px;
                font-size: 1rem;
            }

            .modal {
                border-radius: 20px;
                max-width: 500px;
                max-height: 85vh;
                align-items: center;
                margin: 20px;
            }

            @keyframes modalSlideUp {
                from { opacity: 0; transform: scale(0.95) translateY(20px); }
                to { opacity: 1; transform: scale(1) translateY(0); }
            }
        }

        @media (min-width: 1024px) {
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 30px;
            }

            .student-photo {
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page" id="loginPage">
        <div class="login-container">
            <div class="login-header">
                <div class="logo">🎓</div>
                <h1>同学录</h1>
                <p>欢迎回来，同学</p>
            </div>
            <div class="login-error" id="loginError">账号或密码错误</div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="username" placeholder="请输入账号" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" autocomplete="off">
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
        </div>
    </div>

    <div class="main-page" id="mainPage">
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <div class="brand-icon">🎓</div>
                    <h2>同学录</h2>
                </div>
                <div class="navbar-right">
                    <div class="user-info" id="userInfo">用户</div>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <header>
                <h1>青春纪念册</h1>
                <p>珍藏每一段美好的青春记忆</p>
            </header>

            <div class="action-bar">
                <button class="add-btn" onclick="openModal()">
                    <span>➕</span> 加入同学录
                </button>
            </div>

            <div id="loadingIndicator" style="text-align: center; color: white; padding: 30px; display: none;">
                <div style="font-size: 2rem; margin-bottom: 10px;">⏳</div>
                <div>正在加载同学录数据...</div>
            </div>
            <div id="studentList" class="student-grid">
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📝</div>
                <p>还没有同学加入</p>
                <p class="hint">点击上方按钮，成为第一个加入的同学吧！</p>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>填写信息</h2>
                <div class="modal-close" onclick="closeModal()">✕</div>
            </div>
            <div class="modal-content">
                <form id="studentForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>照片 <span>*</span></label>
                        <div class="photo-upload" id="photoUpload" onclick="document.getElementById('photoInput').click()">
                            <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)">
                            <div class="upload-icon">📷</div>
                            <div class="upload-text">点击上传照片（最多一张）</div>
                        </div>
                        <div class="error-message" id="photoError">请上传照片</div>
                    </div>

                    <div class="form-group">
                        <label>名字 <span>*</span></label>
                        <input type="text" id="name" placeholder="请输入你的名字">
                        <div class="error-message" id="nameError">名字不能为空</div>
                    </div>

                    <div class="form-group">
                        <label>星座 <span>*</span></label>
                        <select id="constellation">
                            <option value="">请选择星座</option>
                            <option value="白羊座">白羊座</option>
                            <option value="金牛座">金牛座</option>
                            <option value="双子座">双子座</option>
                            <option value="巨蟹座">巨蟹座</option>
                            <option value="狮子座">狮子座</option>
                            <option value="处女座">处女座</option>
                            <option value="天秤座">天秤座</option>
                            <option value="天蝎座">天蝎座</option>
                            <option value="射手座">射手座</option>
                            <option value="摩羯座">摩羯座</option>
                            <option value="水瓶座">水瓶座</option>
                            <option value="双鱼座">双鱼座</option>
                        </select>
                        <div class="error-message" id="constellationError">请选择星座</div>
                    </div>

                    <div class="form-group">
                        <label>寄语</label>
                        <textarea id="message" placeholder="写下你想说的话（选填）..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>座右铭</label>
                        <input type="text" id="motto" placeholder="你的人生格言">
                    </div>

                    <div class="form-group">
                        <label>爱好</label>
                        <input type="text" id="hobby" placeholder="你的兴趣爱好">
                    </div>

                    <div class="form-group">
                        <label>微信号</label>
                        <input type="text" id="wechat" placeholder="你的微信号">
                    </div>

                    <div class="form-group">
                        <label>留言</label>
                        <textarea id="comment" placeholder="给同学们的留言..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                        <button type="submit" class="btn-submit">提交</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="adminModalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>管理员寄语</h2>
                <div class="modal-close" onclick="closeAdminModal()">✕</div>
            </div>
            <div class="modal-content">
                <form id="adminMessageForm">
                    <input type="hidden" id="targetStudentId">
                    <div class="form-group">
                        <label>给 <span id="targetStudentName"></span> 的寄语</label>
                        <textarea id="adminMessage" placeholder="写下你想对TA说的话..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="closeAdminModal()">取消</button>
                        <button type="submit" class="btn-submit">发送寄语</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const USERS = {
            '202691': { password: '123456', role: 'user' },
            'admin': { password: '936825', role: 'admin' }
        };

        const SUPABASE_URL = 'https://njqgqsgvqkypdcyxkxkl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qcWdxc2d2cWt5cGRjeXhreGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk5MjYxMjgsImV4cCI6MjAzNTUwMjEyOH0.VB7qJ3l5H5qH0L3lH5qH0L3lH5qH0L3lH5qH0L3lH5qH0';

        let supabase = null;

        function initSupabase() {
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                console.warn('Supabase初始化失败:', e);
                supabase = null;
            }
        }

        let currentUser = null;
        let students = [];
        let currentPhoto = null;

        async function init() {
            initSupabase();
            
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainPage').classList.add('active');
                    
                    const userInfo = document.getElementById('userInfo');
                    if (currentUser.role === 'admin') {
                        userInfo.className = 'user-info admin';
                        userInfo.textContent = '管理员';
                    } else {
                        userInfo.className = 'user-info';
                        userInfo.textContent = currentUser.username || '用户';
                    }
                    
                    await loadStudents();
                } catch (e) {
                    console.error('恢复登录状态失败:', e);
                    localStorage.removeItem('currentUser');
                }
            }
        }

        function saveLoginState() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        }

        async function loadStudents() {
            const loadingEl = document.getElementById('loadingIndicator');
            const emptyState = document.getElementById('emptyState');
            
            loadingEl.style.display = 'block';
            emptyState.style.display = 'none';
            
            if (!supabase) {
                console.warn('Supabase不可用，使用localStorage');
                const saved = localStorage.getItem('students');
                students = saved ? JSON.parse(saved) : [];
                loadingEl.style.display = 'none';
                renderStudents();
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('students')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('加载学生数据失败:', error);
                    const saved = localStorage.getItem('students');
                    students = saved ? JSON.parse(saved) : [];
                } else {
                    students = data || [];
                }
            } catch (e) {
                console.error('加载学生数据异常:', e);
                const saved = localStorage.getItem('students');
                students = saved ? JSON.parse(saved) : [];
            }
            
            loadingEl.style.display = 'none';
            renderStudents();
        }

        async function saveStudent(student) {
            if (!supabase) {
                console.warn('Supabase不可用，使用localStorage');
                student.id = Date.now();
                students.unshift(student);
                localStorage.setItem('students', JSON.stringify(students));
                return true;
            }
            
            try {
                const { error } = await supabase
                    .from('students')
                    .insert([student]);
                
                if (error) {
                    console.error('保存学生数据失败:', error);
                    console.warn('切换到localStorage模式保存');
                    student.id = Date.now();
                    students.unshift(student);
                    localStorage.setItem('students', JSON.stringify(students));
                    return true;
                }
                return true;
            } catch (e) {
                console.error('保存学生数据异常:', e);
                console.warn('切换到localStorage模式保存');
                student.id = Date.now();
                students.unshift(student);
                localStorage.setItem('students', JSON.stringify(students));
                return true;
            }
        }

        async function updateStudent(id, updates) {
            if (!supabase) {
                console.warn('Supabase不可用，使用localStorage');
                const student = students.find(s => s.id === id);
                if (student) {
                    Object.assign(student, updates);
                    localStorage.setItem('students', JSON.stringify(students));
                }
                return true;
            }
            
            try {
                const { error } = await supabase
                    .from('students')
                    .update(updates)
                    .eq('id', id);
                
                if (error) {
                    console.error('更新学生数据失败:', error);
                    return false;
                }
                return true;
            } catch (e) {
                console.error('更新学生数据异常:', e);
                return false;
            }
        }

        async function deleteStudentFromDb(id) {
            if (!supabase) {
                console.warn('Supabase不可用，使用localStorage');
                students = students.filter(s => s.id !== id);
                localStorage.setItem('students', JSON.stringify(students));
                return true;
            }
            
            try {
                const { error } = await supabase
                    .from('students')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    console.error('删除学生数据失败:', error);
                    console.warn('切换到localStorage模式删除');
                    students = students.filter(s => s.id !== id);
                    localStorage.setItem('students', JSON.stringify(students));
                    return true;
                }
                return true;
            } catch (e) {
                console.error('删除学生数据异常:', e);
                console.warn('切换到localStorage模式删除');
                students = students.filter(s => s.id !== id);
                localStorage.setItem('students', JSON.stringify(students));
                return true;
            }
        }

        async function uploadPhoto(file) {
            if (!supabase) {
                console.warn('Supabase不可用，使用base64');
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        resolve(e.target.result);
                    };
                    reader.readAsDataURL(file);
                });
            }
            
            try {
                const fileName = `student_${Date.now()}_${Math.random().toString(36).substring(2, 9)}.jpg`;
                
                const { error: uploadError } = await supabase
                    .storage
                    .from('student_photos')
                    .upload(fileName, file, {
                        contentType: file.type,
                        upsert: false
                    });
                
                if (uploadError) {
                    console.error('上传照片失败:', uploadError);
                    console.warn('切换到base64模式');
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            resolve(e.target.result);
                        };
                        reader.readAsDataURL(file);
                    });
                }
                
                const { data: urlData } = supabase
                    .storage
                    .from('student_photos')
                    .getPublicUrl(fileName);
                
                return urlData.publicUrl;
            } catch (e) {
                console.error('上传照片异常:', e);
                console.warn('切换到base64模式');
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        resolve(e.target.result);
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            
            if (!USERS[username] || USERS[username].password !== password) {
                errorEl.style.display = 'block';
                return;
            }
            
            currentUser = { ...USERS[username], username };
            errorEl.style.display = 'none';
            
            saveLoginState();
            
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').classList.add('active');
            
            const userInfo = document.getElementById('userInfo');
            if (currentUser.role === 'admin') {
                userInfo.className = 'user-info admin';
                userInfo.textContent = '管理员';
            } else {
                userInfo.className = 'user-info';
                userInfo.textContent = username;
            }
            
            try {
                await loadStudents();
            } catch (e) {
                console.error('登录后加载数据失败:', e);
                students = [];
                renderStudents();
            }
        });

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('loginForm').reset();
            document.getElementById('loginError').style.display = 'none';
        }

        function renderStudents() {
            const container = document.getElementById('studentList');
            const emptyState = document.getElementById('emptyState');
            
            container.innerHTML = '';
            
            if (students.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            students.forEach(student => {
                const card = document.createElement('div');
                card.className = 'student-card';
                
                let photoHtml = '';
                if (student.photo) {
                    photoHtml = `<img src="${student.photo}" alt="${student.name}">`;
                } else {
                    photoHtml = `<div class="default-avatar">👤</div>`;
                }
                
                let mottoHtml = '';
                if (student.motto) {
                    mottoHtml = `<div class="student-motto">"${student.motto}"</div>`;
                }
                
                let hobbyHtml = '';
                if (student.hobby) {
                    hobbyHtml = `<div class="detail-item"><span class="icon">🎯</span><strong>${student.hobby}</strong></div>`;
                }
                
                let wechatHtml = '';
                if (student.wechat) {
                    wechatHtml = `<div class="detail-item"><span class="icon">💬</span><strong>${student.wechat}</strong></div>`;
                }
                
                let messageHtml = '';
                if (student.message) {
                    messageHtml = `<div class="student-message">${student.message}</div>`;
                }
                
                let adminMessageHtml = '';
                if (student.admin_message) {
                    adminMessageHtml = `<div class="admin-message">${student.admin_message}</div>`;
                }
                
                let adminActionsHtml = '';
                if (currentUser && currentUser.role === 'admin') {
                    adminActionsHtml = `
                        <div class="admin-actions">
                            <button class="btn-add-message" onclick="openAdminMessageModal(${student.id}, '${student.name}')">
                                <span>✏️</span> 寄语
                            </button>
                            <button class="btn-delete" onclick="deleteStudent(${student.id})">
                                <span>🗑️</span> 删除
                            </button>
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <div class="student-photo">
                        ${photoHtml}
                    </div>
                    <div class="student-info">
                        <div class="student-header">
                            <div class="student-name">${student.name}</div>
                            <div class="student-constellation">${student.constellation}</div>
                        </div>
                        ${mottoHtml}
                        <div class="student-details">
                            ${hobbyHtml}
                            ${wechatHtml}
                        </div>
                        ${messageHtml}
                        ${adminMessageHtml}
                        ${adminActionsHtml}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('studentForm').reset();
            currentPhoto = null;
            resetPhotoUpload();
            hideAllErrors();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function handlePhotoUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                alert('照片大小不能超过5MB');
                input.value = '';
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentPhoto = { file, preview: e.target.result };
                const uploadArea = document.getElementById('photoUpload');
                uploadArea.className = 'photo-upload has-photo';
                uploadArea.innerHTML = `
                    <img src="${currentPhoto.preview}" alt="预览">
                    <div class="remove-text" onclick="removePhoto(event)">点击移除照片</div>
                `;
            };
            reader.readAsDataURL(file);
        }

        function removePhoto(e) {
            e.stopPropagation();
            currentPhoto = null;
            document.getElementById('photoInput').value = '';
            resetPhotoUpload();
        }

        function resetPhotoUpload() {
            const uploadArea = document.getElementById('photoUpload');
            uploadArea.className = 'photo-upload';
            uploadArea.innerHTML = `
                <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击上传照片（最多一张）</div>
            `;
        }

        function hideAllErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
        }

        function showError(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.style.display = 'block';
        }

        function validateForm() {
            hideAllErrors();
            let isValid = true;
            
            const name = document.getElementById('name').value.trim();
            const constellation = document.getElementById('constellation').value;
            
            if (!currentPhoto) {
                showError('photoError', '请上传照片');
                isValid = false;
            }
            
            if (!name) {
                showError('nameError', '名字不能为空');
                isValid = false;
            }
            
            if (!constellation) {
                showError('constellationError', '请选择星座');
                isValid = false;
            }
            
            return isValid;
        }

        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateForm()) return;
            
            let photoUrl = null;
            if (currentPhoto && currentPhoto.file) {
                const uploadBtn = document.querySelector('.btn-submit');
                uploadBtn.textContent = '上传中...';
                uploadBtn.disabled = true;
                
                photoUrl = await uploadPhoto(currentPhoto.file);
                
                uploadBtn.textContent = '提交';
                uploadBtn.disabled = false;
            }
            
            const newStudent = {
                name: document.getElementById('name').value.trim(),
                constellation: document.getElementById('constellation').value,
                message: document.getElementById('message').value.trim(),
                motto: document.getElementById('motto').value.trim(),
                hobby: document.getElementById('hobby').value.trim(),
                wechat: document.getElementById('wechat').value.trim(),
                comment: document.getElementById('comment').value.trim(),
                photo: photoUrl,
                admin_message: ''
            };
            
            const success = await saveStudent(newStudent);
            if (success) {
                await loadStudents();
                closeModal();
                alert('恭喜！你已成功加入同学录！');
            } else {
                alert('保存失败，请重试');
            }
        });

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function openAdminMessageModal(studentId, studentName) {
            document.getElementById('targetStudentId').value = studentId;
            document.getElementById('targetStudentName').textContent = studentName;
            document.getElementById('adminMessage').value = '';
            document.getElementById('adminModalOverlay').classList.add('active');
        }

        function closeAdminModal() {
            document.getElementById('adminModalOverlay').classList.remove('active');
        }

        document.getElementById('adminMessageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const studentId = parseInt(document.getElementById('targetStudentId').value);
            const message = document.getElementById('adminMessage').value.trim();
            
            if (!message) {
                alert('请输入寄语内容');
                return;
            }
            
            const success = await updateStudent(studentId, { admin_message: message });
            if (success) {
                await loadStudents();
                closeAdminModal();
                alert('寄语发送成功！');
            } else {
                alert('发送失败，请重试');
            }
        });

        document.getElementById('adminModalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAdminModal();
            }
        });

        async function deleteStudent(studentId) {
            if (!confirm('确定要删除这位同学吗？此操作不可恢复。')) {
                return;
            }
            
            const success = await deleteStudentFromDb(studentId);
            if (success) {
                await loadStudents();
            } else {
                alert('删除失败，请重试');
            }
        }

        init();
    </script>
</body>
</html>
